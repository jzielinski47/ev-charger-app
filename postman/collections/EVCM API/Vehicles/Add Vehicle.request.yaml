$kind: http-request
name: Add Vehicle
method: POST
url: "{{baseUrl}}/api/vehicles"
headers:
  Content-Type: application/json
queryParams:
  - key: targetEmail
    value: ""
    disabled: true
    description: "Admin only: add vehicle for a specific user by email"
body:
  type: json
  content: |-
    {
      "brand": "Tesla",
      "model": "Model 3",
      "yearOfProduction": 2022,
      "connector": "CCS",
      "isConnectorModified": false
    }
auth:
  type: bearer
  credentials:
    token: "{{admin_token}}"
order: 3000
