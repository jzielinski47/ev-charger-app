$kind: collection
name: EVCM API
description: EV Charging Management API collection. Covers authentication, vehicle management, and charger point discovery.
variables:
  - key: baseUrl
    value: 'http://localhost:8080'
    description: Base URL of the EVCM API server
  - key: token
    value: ''
    description: JWT Bearer token obtained after login
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
