$kind: http-request
name: Login
method: POST
url: "{{baseUrl}}/api/auth/login"
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "john3342.doe@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.token) {
        pm.collectionVariables.set("token", res.token);
      }
    language: text/javascript
order: 2000
