$kind: http-request
name: LoginAdmin
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@localhost",
      "password": "admin"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.token) {
        pm.collectionVariables.set("token", res.token);
      }
    language: text/javascript
order: 968597162690081
