$kind: http-request
name: Sign Up
method: POST
url: '{{baseUrl}}/api/auth/signup'
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John",
      "surname": "Doe",
      "email": "john.doe@example.com",
      "password": "password123"
    }
order: 1000
