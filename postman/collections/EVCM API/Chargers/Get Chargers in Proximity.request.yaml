$kind: http-request
name: Get Chargers in Proximity
method: GET
url: "{{baseUrl}}/api/chargers/ocm/poi"
description: Fetches EV charger points in proximity (hardcoded to lat=50.0, lon=20.0, radius=10km in the service layer).
auth:
  type: bearer
  credentials:
    token: "{{admin_token}}"
order: 1000
