spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true

opencharge.api.key=${OPEN_CHARGE_API_KEY}
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=${JWT_EXP_TIME}

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Reduced Spring Boot logs config
logging.level.org.springframework=WARN
logging.level.org.springframework.boot=INFO
logging.level.org.apache.catalina=WARN
logging.level.jz.pk.evcm=INFO
#logging.level.org.springframework.security=TRACE

spring.jpa.open-in-view=false
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

logging.pattern.console=%d{HH:mm:ss} %-5level - %msg%n
spring.output.ansi.enabled=ALWAYS

spring.web.error.include-message=always

admin.email = ${ADMIN_EMAIL:admin@localhost}
admin.password = ${ADMIN_PASSWORD:admin}

#GRAPHQL PLAYGROUND
spring.graphql.graphiql.enabled=true
spring.graphql.http.path=/graphql/chargers